<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A minimal editor shell for SVG primitive asset experiments."
    />
    <title>Interactive Vector Graphics Editor</title>
  </head>
  <body class="editor-page">
    <main id="editor-app" class="editor-shell" aria-label="Scene editor">
      <aside class="editor-panel editor-assets" aria-label="Assets">
        <header class="editor-panel-header">
          <h1>Projects</h1>
          <span>Persistent workspace</span>
        </header>
        <form id="project-form" class="project-form">
          <input
            id="project-name-input"
            class="text-input"
            type="text"
            placeholder="New project name"
            autocomplete="off"
          />
          <button class="editor-button" type="submit">Create</button>
        </form>
        <ul id="project-list" class="asset-list" aria-label="Projects"></ul>
        <button id="delete-project-button" class="danger-button" type="button">
          Delete Project
        </button>

        <header class="editor-panel-header">
          <h2>Scenes</h2>
          <span>Saved scene documents</span>
        </header>
        <div class="scene-create-row">
          <input
            id="scene-name-input"
            class="text-input"
            type="text"
            placeholder="New scene name"
            autocomplete="off"
          />
          <button id="create-scene-button" class="editor-button" type="button">
            Create
          </button>
        </div>
        <ul id="scene-list" class="asset-list" aria-label="Saved scenes"></ul>
        <div class="scene-action-grid">
          <button id="load-scene-button" class="editor-button" type="button">
            Load Scene
          </button>
          <button id="save-scene-button" class="editor-button" type="button">
            Save Scene
          </button>
          <button id="delete-scene-button" class="danger-button" type="button">
            Delete Scene
          </button>
        </div>

        <header class="editor-panel-header">
          <h2>Assets</h2>
          <span>Primitive SVG</span>
        </header>
        <label class="file-import-button" for="svg-file-input">
          Import SVG
        </label>
        <input
          id="svg-file-input"
          class="file-input"
          type="file"
          accept=".svg,image/svg+xml"
        />
        <p id="import-error" class="editor-error" role="alert" hidden></p>
        <ul id="asset-list" class="asset-list" aria-label="Primitive assets"></ul>
        <button id="add-node-button" class="editor-button" type="button">
          Add to Scene
        </button>
        <button id="delete-asset-button" class="danger-button" type="button">
          Delete Asset
        </button>

        <header class="editor-panel-header">
          <h2>Scene</h2>
          <span>In-memory experiment</span>
        </header>
        <ul id="scene-node-list" class="asset-list" aria-label="Scene nodes"></ul>
      </aside>

      <section class="editor-preview" aria-label="Live preview">
        <div id="viewport-toolbar" class="viewport-toolbar" aria-label="Viewport tools">
          <button id="projection-toggle-button" class="editor-button" type="button">
            Perspective
          </button>
          <div class="toolbar-group" role="group" aria-label="Transform mode">
            <button
              id="transform-translate-button"
              class="editor-button"
              type="button"
            >
              Move
            </button>
            <button
              id="transform-rotate-button"
              class="editor-button"
              type="button"
            >
              Rotate
            </button>
            <button
              id="transform-scale-button"
              class="editor-button"
              type="button"
            >
              Scale
            </button>
          </div>
          <button id="reset-view-button" class="editor-button" type="button">
            Reset View
          </button>
        </div>
        <div id="editor-stage" class="editor-stage">
          <canvas
            id="three-background-canvas"
            class="stage-layer"
            aria-hidden="true"
          ></canvas>
          <canvas
            id="vector-canvas"
            class="stage-layer"
            aria-label="Editor preview canvas"
          ></canvas>
          <canvas
            id="paper-canvas"
            class="stage-layer"
            aria-hidden="true"
          ></canvas>
          <canvas
            id="three-overlay-canvas"
            class="stage-layer"
            aria-label="3D transform helper canvas"
          ></canvas>
        </div>
      </section>

      <aside class="editor-panel editor-inspector" aria-label="Inspector">
        <header class="editor-panel-header">
          <h2>Inspector</h2>
          <span>Selected primitive</span>
        </header>
        <dl id="inspector-fields" class="inspector-fields"></dl>
      </aside>
    </main>
    <script type="module" src="/src/editor/main.ts"></script>
  </body>
</html>
